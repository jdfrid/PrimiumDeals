services:
  - type: web
    name: primium-deals
    runtime: node
    plan: free
    buildCommand: "cd frontend && npm install && npx --yes vite build && cd ../backend && npm install"
    startCommand: "node backend/src/index.js"
    envVars:
      # If the public site is served from another host (e.g. Cloudflare Pages) but API stays on Render,
      # set VITE_API_URL=https://<this-service>.onrender.com so the SPA calls the real API (same value as custom domain pointing here is fine).
      - key: NODE_VERSION
        value: "18.19.0"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      # Secret values - set these in Render Dashboard, not here!
      - key: JWT_SECRET
        sync: false
      - key: EBAY_APP_ID
        sync: false
      - key: EBAY_DEV_ID
        sync: false
      - key: EBAY_CERT_ID
        sync: false
      - key: EBAY_CAMPAIGN_ID
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
