services:
  - type: web
    name: primium-deals
    runtime: node
    plan: free
    # Free web services sleep after ~15 min idle; first request can 502/timeout while waking. Ping https://<service>/api/health
    # every ~10 min (e.g. UptimeRobot/cron) so the dyno stays warm, or upgrade to a paid plan.
    healthCheckPath: /api/health
    buildCommand: "cd frontend && npm install && npx --yes vite build && cd ../backend && npm install"
    startCommand: "node backend/src/index.js"
    envVars:
      # Unified service (recommended): DO NOT define VITE_API_URL in Dashboard — frontend uses relative /api and stays
      # correct behind custom domains. Setting VITE_API_URL to another host here often breaks storefront + admin.
      # Separate static UI only: build with VITE_API_URL=https://your-backend-origin (no /api suffix, no trailing slash).
      - key: NODE_VERSION
        value: "18.19.0"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      # Optional: if deals.db has "dead" rows (none pass public filter), boot adds synthetic demo deals (default 48).
      # Set to 0 to disable auto top-up and only manage data via admin.
      # - key: STOREFRONT_DEAD_DB_TOPUP_COUNT
      #   value: "48"
      - key: JWT_SECRET
        sync: false
      - key: EBAY_APP_ID
        sync: false
      - key: EBAY_DEV_ID
        sync: false
      - key: EBAY_CERT_ID
        sync: false
      - key: EBAY_CAMPAIGN_ID
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Mount a persistent disk and set DATA_DIR so deals.db survives redeploys (optional).
      - key: DATA_DIR
        sync: false
      # Voice Planner (/voice-planner): Google Calendar/Tasks + OpenAI transcription/parsing
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Optional. If omitted, backend derives https://<host>/api/voice-planner/google/callback
      - key: GOOGLE_REDIRECT_URI
        sync: false
      # Optional lightweight gate for the public single-user page
      - key: VOICE_PLANNER_ACCESS_KEY
        sync: false
      # Optional. Useful in local dev if callback should return to Vite at http://localhost:5173/voice-planner
      - key: VOICE_PLANNER_APP_URL
        sync: false
