    <!-- Peel legacy hash routes (#/…) into pathnames — ONLY when we're still on SPA shell /. Never overwrite /admin, /deal/, … -->
    <script>
      (function () {
        var h = window.location.hash;
        if (!h || h.length < 2 || h.charAt(1) !== '/') return;
        var pathOnly = window.location.pathname || '/';
        var shell = pathOnly.replace(/\/+$/, '') || '/';
        if (shell !== '/') {
          try {
            history.replaceState(null, '', pathOnly + window.location.search);
          } catch (e) {}
          return;
        }
        var pathAndQuery = h.slice(1);
        try {
          history.replaceState(null, '', pathAndQuery + window.location.search);
        } catch (e) {
          window.location.replace(pathAndQuery);
        }
      })();
    </script>

    <script>
